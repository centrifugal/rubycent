name: CI

on: [push, pull_request]

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    # Matrix cross-product: Ruby × gemfile. Faraday 3 and ruby-head cells are
    # marked experimental — they don't block CI until those releases stabilise.
    name: Test (Ruby ${{ matrix.ruby }} / ${{ matrix.gemfile }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.4']
        gemfile:
          - gemfiles/faraday2_jwt2.gemfile
          - gemfiles/faraday2_jwt3.gemfile
        experimental: [false]
        include:
          - ruby: '3.4'
            gemfile: gemfiles/faraday3_jwt2.gemfile
            experimental: true
          - ruby: '3.4'
            gemfile: gemfiles/faraday3_jwt3.gemfile
            experimental: true
          - ruby: 'head'
            gemfile: gemfiles/faraday2_jwt3.gemfile
            experimental: true
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}
      CENTRIFUGO_API_URL: http://localhost:8000/api
      CENTRIFUGO_API_KEY: api_key
    steps:
      - uses: actions/checkout@v4

      - name: Start Centrifugo
        run: docker compose up -d

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Wait for Centrifugo
        run: |
          for i in $(seq 1 30); do
            if curl -sf -X POST -H 'X-API-Key: api_key' -H 'Content-Type: application/json' \
                 -d '{}' http://localhost:8000/api/info >/dev/null; then
              echo "Centrifugo ready"; exit 0
            fi
            sleep 1
          done
          echo "Centrifugo did not become healthy"
          docker compose logs centrifugo
          exit 1

      - name: Run tests
        run: bundle exec rspec
